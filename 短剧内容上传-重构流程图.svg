<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800" font-family="-apple-system,'PingFang SC',sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
  <rect width="500" height="800" fill="#ffffff"/>

  <!-- 1 打开上传短剧页面 -->
  <rect x="205" y="25" width="150" height="58" rx="10" fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="280" y="49" text-anchor="middle" font-size="13" fill="#111">打开</text>
  <text x="280" y="68" text-anchor="middle" font-size="13" fill="#111">上传短剧页面</text>
  <line x1="280" y1="83" x2="280" y2="148" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- 2 填写短剧基础信息 -->
  <rect x="205" y="150" width="150" height="58" rx="4" fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="280" y="184" text-anchor="middle" font-size="13" fill="#111">填写短剧基础信息</text>
  <line x1="280" y1="208" x2="280" y2="268" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- 3 填写版权备案信息 -->
  <rect x="205" y="270" width="150" height="58" rx="4" fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="280" y="304" text-anchor="middle" font-size="13" fill="#111">填写版权备案信息</text>
  <line x1="280" y1="328" x2="280" y2="388" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- 4 上传单集信息 -->
  <rect x="205" y="390" width="150" height="58" rx="4" fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="280" y="424" text-anchor="middle" font-size="13" fill="#111">上传单集信息</text>
  <line x1="280" y1="448" x2="280" y2="466" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- 内容审核 菱形 -->
  <polygon points="280,468 350,520 280,572 210,520" fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="280" y="525" text-anchor="middle" font-size="13" fill="#111">内容审核</text>

  <!-- 不通过 分支 -->
  <text x="150" y="508" text-anchor="middle" font-size="12" fill="#333">不通过</text>
  <polyline points="210,520 125,520 125,688" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="40" y="690" width="170" height="64" rx="4" fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="125" y="716" text-anchor="middle" font-size="12.5" fill="#111">返回审核失败原因</text>
  <text x="125" y="736" text-anchor="middle" font-size="12.5" fill="#111">修改重新提交</text>
  <polyline points="40,722 18,722 18,179 203,179" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- 通过 分支 -->
  <text x="412" y="508" text-anchor="middle" font-size="12" fill="#333">通过</text>
  <polyline points="350,520 435,520 435,688" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <rect x="350" y="690" width="130" height="64" rx="4" fill="#fff" stroke="#333" stroke-width="1.3"/>
  <text x="415" y="727" text-anchor="middle" font-size="13" fill="#111">支持经营推广</text>
</svg>
